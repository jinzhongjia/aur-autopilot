version: 2
updates:
  # Keep the SHA-pinned GitHub Actions (checkout, setup-node, pi-coding-agent-action)
  # up to date. Dependabot opens PRs bumping the pins + their version comments.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
