name: pi-agent

# Interactive agent on issues/PRs. Maintainers drive it with the trigger phrase
# (default "/pi "). On the update-available issue, the issue body tells the agent
# what to do when approved: open a PR that bumps `version` in the package's
# manifest. The agent reads the thread and posts its reply back into it.
#
# NOTE: PRs opened with the default GITHUB_TOKEN do NOT trigger other workflows
# (build-check / auto-merge). To get the full one-approval-to-publish flow, set a
# GH_PAT secret (a PAT with contents + pull-requests scope); the agent uses it so
# the PRs it opens run CI. Without it, the agent still works, but you must
# re-run build-check / merge the agent's PR by hand. See README.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pi-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    # Only trusted roles, only on our trigger phrase, never on bot comments.
    if: >-
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      startsWith(github.event.comment.body, vars.PI_TRIGGER || '/pi ')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Pi agent
        uses: shaftoe/pi-coding-agent-action@e527555161657dd7eb0e801d265cfda596a9a44c # v2.20.4
        with:
          # GH_PAT (if set) makes agent-opened PRs trigger CI; falls back to GITHUB_TOKEN.
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          provider: ${{ vars.PI_PROVIDER }}
          model: ${{ vars.PI_MODEL }}
          token: ${{ secrets.PI_API_TOKEN }}
          base_url: ${{ vars.PI_BASE_URL }}
          thinking_level: ${{ vars.PI_THINKING_LEVEL || 'off' }}
          trigger: ${{ vars.PI_TRIGGER || '/pi ' }}
          branch_name_template: "pi/update-{number}-{timestamp}"
          # Defense-in-depth: restrict the agent to the tools this workflow needs.
          loaded_tools: |
            create_pull_request
            update_pull_request
            create_pull_request_review
            get_issue_or_pr_thread
            get_pr_diff
            get_ci_status
            get_workflow_run_logs
